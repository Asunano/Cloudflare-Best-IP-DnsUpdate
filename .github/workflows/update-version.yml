name: Generate Version Hashes

on:
  push:
    branches: [ main ]
    paths:
      - 'cfopt.sh'
      - 'modules/**/*.sh'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_TOKEN }}
        fetch-depth: 0
        persist-credentials: true
    
    - name: Calculate SHA256 hashes
      run: |
        echo "# ============================================================" > version.txt
        echo "# Cloudflare IP Optimizer - Version Management" >> version.txt
        echo "# Format: KEY=VERSION:SHA256" >> version.txt
        echo "# Auto-generated by GitHub Actions" >> version.txt
        echo "# ============================================================" >> version.txt
        echo "" >> version.txt
        
        generate_entry() {
          local key=$1
          local file=$2
          
          if [ -f "$file" ]; then
            local ver=$(grep -m1 '^SCRIPT_VERSION=' "$file" | cut -d'=' -f2 | tr -d '"' | tr -d "'")
            if [ -z "$ver" ]; then
              ver="0.1"
            fi
            
            local hash=$(sha256sum "$file" | awk '{print $1}')
            
            echo "${key}=${ver}:${hash}" >> version.txt
            echo "  [INFO] $key : v$ver"
          else
            echo "  [WARN] $key : File not found ($file)"
          fi
        }
        
        echo "Scanning project files..."
        generate_entry "CFOPT" "cfopt.sh"
        generate_entry "CF_IP_MENU" "modules/cf-ip/menu.sh"
        generate_entry "CF_IP_CORE" "modules/cf-ip/core.sh"
        generate_entry "CF_DNS_CORE" "modules/cf-dns/core.sh"
        generate_entry "CF_DNS_SETUP" "modules/cf-dns/setup.sh"
        generate_entry "DNSPOD_CORE" "modules/dnspod-dns/core.sh"
        generate_entry "DNSPOD_SETUP" "modules/dnspod-dns/setup.sh"
        generate_entry "SCHEDULER_RUN" "modules/scheduler/run.sh"
        generate_entry "IP_SYNC" "modules/ip-sync/sync.sh"
    
    - name: Check for changes
      id: check_changes
      run: |
        if git diff --quiet version.txt; then
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "No changes detected in version.txt"
        else
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "Changes detected in version.txt"
        fi
    
    - name: Configure Git
      if: steps.check_changes.outputs.has_changes == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git
    
    - name: Commit and push changes
      if: steps.check_changes.outputs.has_changes == 'true'
      run: |
        git add version.txt
        git commit -m "ci: auto-update version.txt hashes [skip ci]"
        git push origin main
