name: 自动生成版本哈希值

# 触发条件：
# 1. 推送到 main 分支，且仅当关键脚本文件变更时触发
# 2. 支持手动触发（Actions 页面点击 "Run workflow"）
on:
  push:
    branches: [ main ]
    paths:
      - 'cfopt.sh'              # 主入口脚本
      - 'modules/**/*.sh'       # 所有模块脚本（递归匹配）
  workflow_dispatch:             # 允许手动触发

# 权限配置
permissions:
  contents: write    # 允许读取和写入仓库内容
  actions: write     # 允许管理工作流

jobs:
  # 任务：更新版本哈希值
  update-version:
    name: 计算并更新 SHA256 哈希值
    runs-on: ubuntu-latest
    
    steps:
    # 步骤 1：检出代码
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_TOKEN }}
        fetch-depth: 0              # 获取完整历史记录
        persist-credentials: true   # 保留认证信息
    
    # 步骤 2：ShellCheck 静态检查（仅检测，不阻断流程）
    - name: ShellCheck 静态检查
      continue-on-error: true
      run: |
        echo "======================================"
        echo "  ShellCheck 静态分析（仅报告）"
        echo "======================================"
        echo ""

        # 安装 ShellCheck
        sudo apt-get update -qq
        sudo apt-get install -y -qq shellcheck > /dev/null

        echo "[版本信息]"
        shellcheck --version
        echo ""

        # 收集所有 .sh 文件
        SCRIPTS=()
        [ -f "cfopt.sh" ] && SCRIPTS+=("cfopt.sh")
        [ -f "lib/common.sh" ] && SCRIPTS+=("lib/common.sh")
        while IFS= read -r -d '' file; do
          SCRIPTS+=("$file")
        done < <(find modules -name "*.sh" -type f -print0 2>/dev/null)

        if [ ${#SCRIPTS[@]} -eq 0 ]; then
          echo "  [WARN] 未找到任何 .sh 文件，跳过检查"
          exit 0
        fi

        echo "[待检查文件: ${#SCRIPTS[@]} 个]"
        for f in "${SCRIPTS[@]}"; do
          echo "  - $f"
        done
        echo ""

        # 执行 ShellCheck
        TOTAL_PASS=0
        TOTAL_WARN=0
        TOTAL_FAIL=0
        TOTAL_ISSUES=0

        for script in "${SCRIPTS[@]}"; do
          echo "--------------------------------------"
          echo "检查: $script"
          echo "--------------------------------------"

          OUTPUT=$(shellcheck -s bash -S warning -f gcc "$script" 2>&1) || true

          if [ -z "$OUTPUT" ]; then
            echo "  ✓ 通过"
            TOTAL_PASS=$((TOTAL_PASS + 1))
            echo ""
            continue
          fi

          FILE_ERRORS=$(echo "$OUTPUT" | grep -c ": error:" || true)
          FILE_WARNINGS=$(echo "$OUTPUT" | grep -c ": warning:" || true)
          FILE_NOTES=$(echo "$OUTPUT" | grep -c ": note:" || true)
          FILE_TOTAL=$((FILE_ERRORS + FILE_WARNINGS + FILE_NOTES))
          TOTAL_ISSUES=$((TOTAL_ISSUES + FILE_TOTAL))

          echo ""
          echo "$OUTPUT"
          echo ""

          # 转为 GitHub Actions 注解
          while IFS= read -r line; do
            ANNOTATION=$(echo "$line" | awk -F': ' '{
              split($1, loc, ":")
              file = loc[1]; line_num = loc[2]; col_num = loc[3]
              level = $2
              msg = ""
              for (i = 3; i <= NF; i++) {
                if (msg != "") msg = msg ": "
                msg = msg $i
              }
              gsub(/%/, "%25", msg)
              gsub(/\n/, "%0A", msg)
              if (level == "error") {
                printf "::error file=%s,line=%s,col=%s::%s\n", file, line_num, col_num, msg
              } else if (level == "warning") {
                printf "::warning file=%s,line=%s,col=%s::%s\n", file, line_num, col_num, msg
              } else if (level == "note") {
                printf "::notice file=%s,line=%s,col=%s::%s\n", file, line_num, col_num, msg
              }
            }')
            echo "$ANNOTATION"
          done <<< "$OUTPUT"

          if [ "$FILE_ERRORS" -gt 0 ]; then
            echo ""
            echo "  ✗ error: $FILE_ERRORS, warning: $FILE_WARNINGS, note: $FILE_NOTES"
            TOTAL_FAIL=$((TOTAL_FAIL + 1))
          else
            echo ""
            echo "  △ warning: $FILE_WARNINGS, note: $FILE_NOTES"
            TOTAL_WARN=$((TOTAL_WARN + 1))
          fi
          echo ""
        done

        # 汇总报告
        echo ""
        echo "======================================"
        echo "  ShellCheck 检查汇总"
        echo "======================================"
        echo "  扫描文件:   ${#SCRIPTS[@]} 个"
        echo "  通过:       $TOTAL_PASS 个"
        echo "  仅警告:     $TOTAL_WARN 个"
        echo "  有错误:     $TOTAL_FAIL 个"
        echo "  问题总数:   $TOTAL_ISSUES 个"
        echo "======================================"
        echo ""
        echo "  提示：当前为开发阶段，检查结果仅供参考"
        echo "  后续稳定后可移除 continue-on-error 改为强制检查"
        echo ""
    
    # 步骤 3：计算所有脚本的 SHA256 哈希值
    - name: 计算 SHA256 哈希值
      run: |
        echo "# ============================================================" > version.txt
        echo "# Cloudflare IP 优选工具 - 统一版本管理中心" >> version.txt
        echo "# 格式: KEY=VERSION:SHA256" >> version.txt
        echo "# 说明：由 GitHub Actions 自动生成，请勿手动修改" >> version.txt
        echo "# 用途：用于客户端更新时的完整性校验" >> version.txt
        echo "# ============================================================" >> version.txt
        echo "" >> version.txt
        
        echo "======================================"
        echo "  开始计算脚本 SHA256 哈希值"
        echo "======================================"
        echo ""
        
        # 定义函数：提取版本号并计算哈希值
        generate_entry() {
          local key=$1
          local file=$2
          
          if [ -f "$file" ]; then
            # 提取版本号（支持双引号和单引号）
            local ver=$(grep -m1 '^SCRIPT_VERSION=' "$file" | cut -d'=' -f2 | tr -d '"' | tr -d "'")
            if [ -z "$ver" ]; then
              ver="0.1"
            fi
            
            # 计算 SHA256 哈希值
            local hash=$(sha256sum "$file" | awk '{print $1}')
            
            # 写入 version.txt
            echo "${key}=${ver}:${hash}" >> version.txt
            echo "  [INFO] $key : v$ver"
          else
            echo "  [WARN] $key : 文件不存在 ($file)"
          fi
        }
        
        echo "[扫描项目文件...]"
        echo ""
        
        # 依次处理所有脚本文件
        generate_entry "UPDATER" "modules/updater/update.sh"
        generate_entry "CFOPT" "cfopt.sh"
        generate_entry "QUICK_DEPLOY" "modules/quick-deploy/setup.sh"
        generate_entry "CF_IP_MENU" "modules/cf-ip/menu.sh"
        generate_entry "CF_IP_CORE" "modules/cf-ip/core.sh"
        generate_entry "CF_DNS_CORE" "modules/cf-dns/core.sh"
        generate_entry "CF_DNS_SETUP" "modules/cf-dns/setup.sh"
        generate_entry "DNSPOD_CORE" "modules/dnspod-dns/core.sh"
        generate_entry "DNSPOD_SETUP" "modules/dnspod-dns/setup.sh"
        generate_entry "SCHEDULER_RUN" "modules/scheduler/run.sh"
        generate_entry "IP_SYNC" "modules/ip-sync/sync.sh"
        generate_entry "COMMON_LIB" "lib/common.sh"
        
        echo ""
        echo "======================================"
        echo "  哈希值计算完成"
        echo "======================================"
    
    # 步骤 4：检查 version.txt 是否有变更
    - name: 检查文件变更
      id: check_changes
      run: |
        echo ""
        echo "[检查变更...]"
        if git diff --quiet version.txt; then
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "  [INFO] version.txt 无变更，跳过提交"
        else
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "  [INFO] 检测到 version.txt 变更，准备提交"
        fi
    
    # 步骤 5：配置 Git 认证信息
    - name: 配置 Git
      if: steps.check_changes.outputs.has_changes == 'true'
      run: |
        echo ""
        echo "[配置 Git 认证...]"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        # 使用 PAT Token 设置远程仓库地址（确保推送权限）
        git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git
        echo "  [INFO] Git 配置完成"
    
    # 步骤 6：提交并推送更新
    - name: 提交并推送
      if: steps.check_changes.outputs.has_changes == 'true'
      run: |
        echo ""
        echo "[提交更改...]"
        git add version.txt
        git commit -m "ci: 自动更新 version.txt 哈希值 [skip ci]"
        echo ""
        echo "[推送至 GitHub...]"
        git push origin main
        echo ""
        echo "======================================"
        echo "  [OK] version.txt 更新成功！"
        echo "======================================"
        echo ""
        echo "提示："
        echo "  • [skip ci] 标记避免触发无限循环"
        echo "  • 客户端可通过校验哈希值确保文件完整性"
        echo ""
